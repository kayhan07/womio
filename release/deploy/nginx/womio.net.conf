server {
    listen 80;
    server_name womio.net www.womio.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name womio.net www.womio.net;

    # Replace with your certificate paths
    ssl_certificate /etc/letsencrypt/live/womio.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/womio.net/privkey.pem;

    root /var/www/womio/web;
    index index.html;

    # Expo web static output
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional direct apk hosting path
    location /downloads/ {
        alias /var/www/womio/downloads/;
        add_header Cache-Control "public, max-age=3600";
    }

    # Backend proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
